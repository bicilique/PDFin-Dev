<!-- @dsCard group="Spacing" viewport="700x170" subtitle="Radii + shadow levels on cards" name="Radii & shadows" -->
<!DOCTYPE html>
<html><head><link rel="stylesheet" href="../styles.css">
<style>
  body{padding:24px;display:flex;gap:16px;align-items:stretch}
  .c{flex:1;background:var(--surface-card);border:1px solid var(--border-default);display:flex;align-items:flex-end;padding:12px}
  code{font:var(--type-caption);font-family:var(--font-mono);color:var(--text-muted)}
</style></head>
<body>
  <div class="c" style="border-radius:var(--radius-sm)"><code>sm 6 · flat</code></div>
  <div class="c" style="border-radius:var(--radius-md);box-shadow:var(--shadow-card)"><code>md 10 · card</code></div>
  <div class="c" style="border-radius:var(--radius-lg);box-shadow:var(--shadow-raised)"><code>lg 14 · raised</code></div>
  <div class="c" style="border-radius:var(--radius-xl);box-shadow:var(--shadow-overlay)"><code>xl 20 · overlay</code></div>
  <div class="c" style="border-radius:var(--radius-pill);box-shadow:var(--shadow-focus)"><code>pill · focus ring</code></div>
</body></html>
