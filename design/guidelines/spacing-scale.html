<!-- @dsCard group="Spacing" viewport="700x150" subtitle="4px base scale" name="Spacing tokens" -->
<!DOCTYPE html>
<html><head><link rel="stylesheet" href="../styles.css">
<style>
  body{padding:20px 24px;display:flex;align-items:flex-end;gap:14px;background:var(--surface-card)}
  .t{display:flex;flex-direction:column;align-items:center;gap:6px}
  .bar{background:var(--violet-300);border-radius:3px;width:22px}
  code{font:var(--type-caption);font-family:var(--font-mono);color:var(--text-muted)}
</style></head>
<body>
  <div class="t"><div class="bar" style="height:4px"></div><code>1·4</code></div>
  <div class="t"><div class="bar" style="height:8px"></div><code>2·8</code></div>
  <div class="t"><div class="bar" style="height:12px"></div><code>3·12</code></div>
  <div class="t"><div class="bar" style="height:16px"></div><code>4·16</code></div>
  <div class="t"><div class="bar" style="height:20px"></div><code>5·20</code></div>
  <div class="t"><div class="bar" style="height:24px"></div><code>6·24</code></div>
  <div class="t"><div class="bar" style="height:32px"></div><code>8·32</code></div>
  <div class="t"><div class="bar" style="height:40px"></div><code>10·40</code></div>
  <div class="t"><div class="bar" style="height:48px"></div><code>12·48</code></div>
  <div class="t"><div class="bar" style="height:64px"></div><code>16·64</code></div>
  <div class="t"><div class="bar" style="height:80px"></div><code>20·80</code></div>
</body></html>
