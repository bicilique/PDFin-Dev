<!-- @dsCard group="Colors" viewport="700x150" subtitle="Cyan accent scale — privacy / trust color" name="Accent / Cyan" -->
<!DOCTYPE html>
<html><head><link rel="stylesheet" href="../styles.css">
<style>
  body{display:flex;gap:8px;padding:20px;align-items:stretch}
  .sw{flex:1;border-radius:10px;display:flex;flex-direction:column;justify-content:flex-end;padding:8px;height:106px}
  .sw span{font:var(--type-caption);font-family:var(--font-mono)}
</style></head>
<body>
  <div class="sw" style="background:var(--cyan-050)"><span style="color:var(--cyan-800)">050</span></div>
  <div class="sw" style="background:var(--cyan-100)"><span style="color:var(--cyan-800)">100</span></div>
  <div class="sw" style="background:var(--cyan-200)"><span style="color:var(--cyan-800)">200</span></div>
  <div class="sw" style="background:var(--cyan-300)"><span style="color:var(--cyan-900)">300</span></div>
  <div class="sw" style="background:var(--cyan-400)"><span style="color:var(--cyan-900)">400<br>#23CDD8</span></div>
  <div class="sw" style="background:var(--cyan-500)"><span style="color:#fff">500</span></div>
  <div class="sw" style="background:var(--cyan-600)"><span style="color:#fff">600<br>#128FA6</span></div>
  <div class="sw" style="background:var(--cyan-700)"><span style="color:#fff">700</span></div>
  <div class="sw" style="background:var(--cyan-800)"><span style="color:#fff">800</span></div>
  <div class="sw" style="background:var(--cyan-900)"><span style="color:#fff">900</span></div>
</body></html>
