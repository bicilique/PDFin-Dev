<!DOCTYPE html>
<html><head><link rel="stylesheet" href="../styles.css">
<style>
  body{padding:20px 24px;display:flex;flex-direction:column;gap:8px;background:var(--surface-card)}
  .row{display:flex;align-items:baseline;gap:16px}
  .row code{font:var(--type-caption);font-family:var(--font-mono);color:var(--text-faint);width:110px;flex:none}
</style></head>
<body>
  <div class="row"><code>--type-display</code><span style="font:var(--type-display);color:var(--text-heading);letter-spacing:var(--tracking-tight)">Gabung PDF</span></div>
  <div class="row"><code>--type-h1</code><span style="font:var(--type-h1);color:var(--text-heading);letter-spacing:var(--tracking-tight)">Gabung PDF</span></div>
  <div class="row"><code>--type-h2</code><span style="font:var(--type-h2);color:var(--text-heading);letter-spacing:var(--tracking-tight)">Merge PDF files</span></div>
  <div class="row"><code>--type-h3</code><span style="font:var(--type-h3);color:var(--text-heading)">Pilih file untuk digabung</span></div>
  <div class="row"><code>--type-h4</code><span style="font:var(--type-h4);color:var(--text-heading)">Opsi keluaran</span></div>
</body></html>
