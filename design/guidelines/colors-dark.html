<!-- @dsCard group="Colors" viewport="700x180" name="Dark theme" subtitle="[data-theme=dark] — near-black violet, same semantic tokens" -->
<!DOCTYPE html>
<html><head><link rel="stylesheet" href="../styles.css"></head>
<body data-theme="dark" style="background:var(--surface-page);height:100vh;margin:0">
<div style="display:flex;gap:12px;padding:20px;align-items:center">
  <div style="flex:1;background:var(--surface-card);border:1px solid var(--border-subtle);border-radius:var(--radius-lg);padding:16px">
    <div style="color:var(--text-strong);font-weight:var(--weight-bold);font-size:var(--text-base)">Gabung PDF</div>
    <div style="color:var(--text-muted);font-size:var(--text-sm);margin-top:4px">Satukan beberapa PDF menjadi satu file.</div>
  </div>
  <button style="background:var(--action-primary);color:#fff;border:none;border-radius:var(--radius-md);padding:12px 20px;font:inherit;font-weight:var(--weight-semibold)">Proses</button>
  <div style="background:var(--privacy-bg);border:1px solid var(--privacy-border);color:var(--privacy-text);border-radius:var(--radius-md);padding:12px 16px;font-size:var(--text-sm)">File tetap di perangkat Anda</div>
</div>
</body></html>
