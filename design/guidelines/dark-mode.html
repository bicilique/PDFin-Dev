<!-- @dsCard group="Colors" viewport="700x180" subtitle="Dark theme token remap" name="Dark mode" -->
<!DOCTYPE html>
<html><head><link rel="stylesheet" href="../styles.css">
<style>body{margin:0;display:flex}</style></head>
<body>
  <div style="flex:1;background:var(--surface-page);padding:20px 24px;display:flex;flex-direction:column;gap:10px">
    <span style="font:var(--type-h4);color:var(--text-heading)">Light</span>
    <div style="background:var(--surface-card);border:1px solid var(--border-default);border-radius:10px;box-shadow:var(--shadow-card);padding:12px 14px;font:var(--type-body-sm);color:var(--text-body)">Kartu di atas <code style="color:var(--text-muted)">--surface-page</code></div>
    <button style="align-self:flex-start;background:var(--action-primary);color:#fff;border:0;border-radius:10px;padding:8px 16px;font:var(--type-label)">Proses</button>
  </div>
  <div data-theme="dark" style="flex:1;background:var(--surface-page);padding:20px 24px;display:flex;flex-direction:column;gap:10px">
    <span style="font:var(--type-h4);color:var(--text-heading)">Dark</span>
    <div style="background:var(--surface-card);border:1px solid var(--border-default);border-radius:10px;box-shadow:var(--shadow-card);padding:12px 14px;font:var(--type-body-sm);color:var(--text-body)">Kartu di atas <code style="color:var(--text-muted)">--surface-page</code></div>
    <button style="align-self:flex-start;background:var(--action-primary);color:#fff;border:0;border-radius:10px;padding:8px 16px;font:var(--type-label)">Proses</button>
  </div>
</body></html>
