<!-- @dsCard group="Colors" viewport="700x150" subtitle="Ink neutrals — cool, violet-cast" name="Neutrals / Ink" -->
<!DOCTYPE html>
<html><head><link rel="stylesheet" href="../styles.css">
<style>
  body{display:flex;gap:8px;padding:20px;align-items:stretch}
  .sw{flex:1;border-radius:10px;display:flex;flex-direction:column;justify-content:flex-end;padding:8px;height:106px;border:1px solid var(--ink-200)}
  .sw span{font:var(--type-caption);font-family:var(--font-mono)}
</style></head>
<body>
  <div class="sw" style="background:var(--ink-000)"><span style="color:var(--ink-600)">000</span></div>
  <div class="sw" style="background:var(--ink-050)"><span style="color:var(--ink-600)">050</span></div>
  <div class="sw" style="background:var(--ink-100)"><span style="color:var(--ink-600)">100</span></div>
  <div class="sw" style="background:var(--ink-200)"><span style="color:var(--ink-700)">200</span></div>
  <div class="sw" style="background:var(--ink-300)"><span style="color:var(--ink-800)">300</span></div>
  <div class="sw" style="background:var(--ink-400)"><span style="color:#fff">400</span></div>
  <div class="sw" style="background:var(--ink-500)"><span style="color:#fff">500</span></div>
  <div class="sw" style="background:var(--ink-600)"><span style="color:#fff">600</span></div>
  <div class="sw" style="background:var(--ink-700)"><span style="color:#fff">700</span></div>
  <div class="sw" style="background:var(--ink-800)"><span style="color:#fff">800</span></div>
  <div class="sw" style="background:var(--ink-900)"><span style="color:#fff">900</span></div>
  <div class="sw" style="background:var(--ink-950)"><span style="color:#fff">950</span></div>
</body></html>
