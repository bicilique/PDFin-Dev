<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="PDFin adalah alat PDF gratis yang memproses file di browser tanpa mengunggah file ke server."
    />
    <link rel="icon" type="image/png" href="/logo/pdfin-mark-32.png" />
    <script>
      (() => {
        const valid = new Set(["light", "dark"]);
        const normalize = (value) => valid.has(value) ? value : null;
        let theme = null;
        try {
          theme = normalize(localStorage.getItem("pdfin-theme")) || normalize(localStorage.getItem("pdfin-ws-theme"));
        } catch {}
        if (!theme) {
          theme = window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light";
        }
        document.documentElement.setAttribute("data-theme", theme);
      })();
    </script>
    <title>PDFin</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
