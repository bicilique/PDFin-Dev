<!DOCTYPE html>
<html><head><link rel="stylesheet" href="../styles.css">
<style>.box{background:var(--surface-brand-subtle);border:1.5px solid var(--violet-300);width:96px;height:72px;display:flex;align-items:center;justify-content:center;font-family:var(--font-mono);font-size:10px;color:var(--violet-700)}</style></head>
<body style="background:var(--surface-card);padding:24px 28px;display:flex;gap:20px;align-items:center">

<div class="box" style="border-radius:var(--radius-sm)">sm · 6</div>
<div class="box" style="border-radius:var(--radius-md)">md · 10</div>
<div class="box" style="border-radius:var(--radius-lg)">lg · 14</div>
<div class="box" style="border-radius:var(--radius-xl)">xl · 20</div>
