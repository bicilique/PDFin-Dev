<!-- @dsCard group="Colors" viewport="700x150" subtitle="Violet primary scale — from the logo mark" name="Primary / Violet" -->
<!DOCTYPE html>
<html><head><link rel="stylesheet" href="../styles.css">
<style>
  body{display:flex;gap:8px;padding:20px;align-items:stretch}
  .sw{flex:1;border-radius:10px;display:flex;flex-direction:column;justify-content:flex-end;padding:8px;height:106px}
  .sw span{font:var(--type-caption);font-family:var(--font-mono)}
</style></head>
<body>
  <div class="sw" style="background:var(--violet-050)"><span style="color:var(--violet-800)">050</span></div>
  <div class="sw" style="background:var(--violet-100)"><span style="color:var(--violet-800)">100</span></div>
  <div class="sw" style="background:var(--violet-200)"><span style="color:var(--violet-800)">200</span></div>
  <div class="sw" style="background:var(--violet-300)"><span style="color:var(--violet-900)">300</span></div>
  <div class="sw" style="background:var(--violet-400)"><span style="color:#fff">400</span></div>
  <div class="sw" style="background:var(--violet-500)"><span style="color:#fff">500</span></div>
  <div class="sw" style="background:var(--violet-600)"><span style="color:#fff">600<br>#5518B4</span></div>
  <div class="sw" style="background:var(--violet-700)"><span style="color:#fff">700</span></div>
  <div class="sw" style="background:var(--violet-800)"><span style="color:#fff">800<br>#370C7C</span></div>
  <div class="sw" style="background:var(--violet-900)"><span style="color:#fff">900</span></div>
</body></html>
