<!-- @dsCard group="Colors" viewport="700x170" subtitle="Brand gradient + privacy accent usage" name="Gradient & privacy accent" -->
<!DOCTYPE html>
<html><head><link rel="stylesheet" href="../styles.css">
<style>body{display:flex;gap:12px;padding:20px;align-items:stretch}</style></head>
<body>
  <div style="flex:1.4;border-radius:14px;background:var(--gradient-brand);display:flex;align-items:flex-end;padding:14px">
    <code style="color:#fff;font:var(--type-caption);font-family:var(--font-mono)">--gradient-brand</code>
  </div>
  <div style="flex:1;border-radius:14px;background:var(--gradient-brand-soft);border:1px solid var(--border-default);display:flex;align-items:flex-end;padding:14px">
    <code style="color:var(--ink-700);font:var(--type-caption);font-family:var(--font-mono)">--gradient-brand-soft</code>
  </div>
  <div style="flex:1.2;display:flex;flex-direction:column;gap:10px;justify-content:center">
    <span style="align-self:flex-start;display:inline-flex;align-items:center;gap:6px;background:var(--privacy-bg);color:var(--privacy-fg);border:1px solid var(--privacy-border);border-radius:999px;padding:6px 12px;font:var(--type-caption)">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path></svg>
      File tetap di perangkat Anda
    </span>
    <span style="align-self:flex-start;display:inline-flex;align-items:center;gap:6px;background:var(--privacy-bg);color:var(--privacy-fg);border:1px solid var(--privacy-border);border-radius:999px;padding:6px 12px;font:var(--type-caption)">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path></svg>
      Files stay on your device
    </span>
  </div>
</body></html>
